<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Sayfayı tam merkeze alan ve kaymaları önleyen Body yapısı */
        body {
            background-color: #050505; /* Işığın daha iyi parlaması için çok koyu arka plan */
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* YENİ: Antigravity - Güçlendirilmiş fare takip ışığı */
        .cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(
                circle closest-side, 
                rgba(96, 165, 250, 0.4) 0%,   /* Merkez çok parlak mavi */
                rgba(139, 92, 246, 0.15) 40%, /* Geçişte tatlı bir mor */
                transparent 100%
            );
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            transition: transform 0.1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            will-change: transform;
            mix-blend-mode: screen; /* Yazıları ve kutuları neon gibi aydınlatır */
        }

        /* Sabit arka plan ambiyans parlamaları */
        .glow-blob-1, .glow-blob-2 {
            position: fixed;
            border-radius: 50%;
            filter: blur(150px);
            z-index: 0;
            opacity: 0.5;
            animation: float 12s ease-in-out infinite alternate;
        }
        .glow-blob-1 {
            top: -10%; left: -10%;
            width: 500px; height: 500px;
            background: #1e3a8a;
        }
        .glow-blob-2 {
            bottom: -10%; right: -10%;
            width: 600px; height: 600px;
            background: #4c1d95;
            animation-delay: -6s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 80px); }
        }
        
        /* Merkeze oturtulmuş Ana Konteyner */
        .container {
            width: 100%;
            max-width: 850px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 45px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 20%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        h1::before {
            content: '💎';
            font-size: 2.5rem;
            -webkit-text-fill-color: initial;
            filter: drop-shadow(0 0 20px rgba(96, 165, 250, 0.6));
        }
        
        .form-label {
            color: #cbd5e1;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .form-label i {
            color: #60a5fa;
        }
        
        .form-control, .form-select {
            background-color: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: rgba(30, 41, 59, 0.9);
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
            color: #ffffff;
            outline: none;
        }
        
        .form-control::placeholder {
            color: #475569;
        }

        option {
            background-color: #0f172a;
            color: #ffffff;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            color: #ffffff;
            padding: 16px 50px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 16px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
            margin-top: 20px;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.7);
            background: linear-gradient(135deg, #4f46e5, #9333ea);
        }
        
        .result {
            margin-top: 40px;
            padding: 30px;
            border-radius: 18px;
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result h4 {
            color: #34d399;
            font-weight: 700;
            margin: 0;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-shadow: 0 0 20px rgba(52, 211, 153, 0.4);
        }
        
        .mb-3 {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="glow-blob-1"></div>
    <div class="glow-blob-2"></div>

    <div class="container">
        <h1>Diamond Price Predictor</h1>
        <form id="predictionForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="carat" class="form-label"><i class="fas fa-weight"></i> Carat</label>
                    <input type="number" step="0.01" class="form-control" id="carat" placeholder="e.g., 1.25" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="cut" class="form-label"><i class="fas fa-cut"></i> Cut</label>
                    <select class="form-select" id="cut" required>
                        <option value="Fair">Fair</option>
                        <option value="Good">Good</option>
                        <option value="Very Good">Very Good</option>
                        <option value="Premium">Premium</option>
                        <option value="Ideal">Ideal</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="color" class="form-label"><i class="fas fa-palette"></i> Color</label>
                    <select class="form-select" id="color" required>
                        <option value="D">D (Colorless)</option>
                        <option value="E">E (Colorless)</option>
                        <option value="F">F (Colorless)</option>
                        <option value="G">G (Near Colorless)</option>
                        <option value="H">H (Near Colorless)</option>
                        <option value="I">I (Near Colorless)</option>
                        <option value="J">J (Near Colorless)</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="clarity" class="form-label"><i class="fas fa-eye"></i> Clarity</label>
                    <select class="form-select" id="clarity" required>
                        <option value="I1">I1 (Included)</option>
                        <option value="SI2">SI2 (Slightly Included)</option>
                        <option value="SI1">SI1 (Slightly Included)</option>
                        <option value="VS2">VS2 (Very Slightly Included)</option>
                        <option value="VS1">VS1 (Very Slightly Included)</option>
                        <option value="VVS2">VVS2 (Very Very Slightly Included)</option>
                        <option value="VVS1">VVS1 (Very Very Slightly Included)</option>
                        <option value="IF">IF (Internally Flawless)</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="depth" class="form-label"><i class="fas fa-arrows-alt-v"></i> Depth (%)</label>
                    <input type="number" step="0.01" class="form-control" id="depth" placeholder="e.g., 61.5" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="table" class="form-label"><i class="fas fa-table"></i> Table (%)</label>
                    <input type="number" step="0.01" class="form-control" id="table" placeholder="e.g., 57.0" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="x" class="form-label"><i class="fas fa-ruler-horizontal"></i> Length (mm)</label>
                    <input type="number" step="0.01" class="form-control" id="x" placeholder="e.g., 5.73" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="y" class="form-label"><i class="fas fa-ruler-vertical"></i> Width (mm)</label>
                    <input type="number" step="0.01" class="form-control" id="y" placeholder="e.g., 5.76" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="z" class="form-label"><i class="fas fa-cube"></i> Depth (mm)</label>
                    <input type="number" step="0.01" class="form-control" id="z" placeholder="e.g., 3.53" required>
                </div>
            </div>
            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-calculator me-2"></i> Predict Diamond Price
                </button>
            </div>
        </form>
        <div id="result" class="result text-center">
            <h4><i class="fas fa-gem"></i> Predicted Price: <span id="predictedPrice" class="ms-2">$0</span></h4>
        </div>
    </div>

    <script>
        const cursorGlow = document.getElementById('cursorGlow');
        
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            cursorGlow.style.transform = `translate3d(calc(${x}px - 50%), calc(${y}px - 50%), 0)`;
        });
    </script>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('Form submitted!');
            
            const formData = {
                carat: parseFloat(document.getElementById('carat').value),
                cut: document.getElementById('cut').value,
                color: document.getElementById('color').value,
                clarity: document.getElementById('clarity').value,
                depth: parseFloat(document.getElementById('depth').value),
                table: parseFloat(document.getElementById('table').value),
                x: parseFloat(document.getElementById('x').value),
                y: parseFloat(document.getElementById('y').value),
                z: parseFloat(document.getElementById('z').value)
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                document.getElementById('predictedPrice').textContent = 
                    new Intl.NumberFormat('en-US', { 
                        style: 'currency', 
                        currency: 'USD',
                        maximumFractionDigits: 0 
                    }).format(data.predicted_price);
                document.getElementById('result').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while making the prediction.');
            }
        });
    </script>
</body>
</html>
